<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title class="ion-text-center">
      <ion-icon name="list-outline" class="title-icon"></ion-icon>
      TaskMaster Lite
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-item lines="full" class="ion-margin-bottom add-task-item">
    <ion-input
      type="text"
      placeholder="Nueva tarea"
      enterkeyhint="done"
      autocapitalize="sentences"
      [(ngModel)]="task"
      (keyup.enter)="addTask()"
    ></ion-input>
    <ion-button slot="end" fill="clear" (click)="addTask()" [disabled]="!task.trim()">
      <ion-icon name="add-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </ion-item>

  @if (taskList.length > 0) {
    <ion-list lines="full" class="task-list">
      <ion-reorder-group (ionItemReorder)="handleReorder($event)">
        @for (task of taskList; track task.id) {
          <ion-item-sliding #slidingItem>
            <ion-item>
              <ion-reorder slot="start">
                <ion-icon name="reorder-three-outline"></ion-icon>
              </ion-reorder>
              <ion-label class="ion-text-wrap">{{ task.title }}</ion-label>
            </ion-item>

            <ion-item-options side="end">
              <ion-item-option color="danger" (click)="confirmDelete(task, slidingItem)">
                <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
              </ion-item-option>
            </ion-item-options>
          </ion-item-sliding>
        }
      </ion-reorder-group>
    </ion-list>
  } @else {
    <ion-item lines="none" class="ion-text-center ion-margin-top empty-state">
      <ion-label class="ion-text-wrap">
        <p>No hay tareas. ¡Agrega una nueva tarea para empezar!</p>
      </ion-label>
    </ion-item>
  }
</ion-content>
